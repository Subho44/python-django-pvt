{% extends "base.html" %}

{% block title %}Add Product{% endblock %}

{% block content %}

<style>
    .add-product-section {
        min-height: 90vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
    }

    .product-card {
        width: 100%;
        max-width: 650px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 35px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        animation: fadeUp 0.8s ease-in-out;
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .product-card h2 {
        color: #fff;
        text-align: center;
        font-weight: bold;
        margin-bottom: 25px;
    }

    .form-label {
        color: #fff;
        font-weight: 600;
    }

    .form-control {
        border-radius: 12px;
        padding: 12px;
        border: none;
    }

    .form-control:focus {
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.3);
    }

    .btn-add {
        width: 100%;
        padding: 13px;
        border-radius: 30px;
        font-weight: bold;
        background: linear-gradient(45deg, #ff512f, #dd2476);
        border: none;
        color: white;
        transition: 0.4s;
    }

    .btn-add:hover {
        transform: scale(1.04);
        box-shadow: 0 10px 25px rgba(221, 36, 118, 0.5);
        color: white;
    }

    .preview-box {
        margin-top: 20px;
        text-align: center;
    }

    .preview-box img {
        max-width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 18px;
        display: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
</style>

<section class="add-product-section">
    <div class="product-card">

        <h2> Add New Product</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter product name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Price</label>
                <input type="number" name="price" class="form-control" placeholder="Enter product price" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Category</label>
                <input type="text" name="category" class="form-control" placeholder="Enter category" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Rating</label>
                <input type="number" step="0.1" name="rating" class="form-control" placeholder="Enter rating" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Image</label>
                <input type="file" name="image" class="form-control" accept="image/*" onchange="previewImage(event)"
                    required>
            </div>

            <div class="preview-box">
                <img id="preview">
            </div>

            <button type="submit" class="btn btn-add mt-4">
                Add Product
            </button>
        </form>

    </div>
</section>

<script>
    function previewImage(event) {
        const image = document.getElementById("preview");
        image.src = URL.createObjectURL(event.target.files[0]);
        image.style.display = "block";
    }
</script>

{% endblock %}
