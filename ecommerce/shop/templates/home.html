{% extends 'base.html' %}
{% block content %}

<h2 class="text-center mb-4">Latest products</h2>
<div class="row">
    {% for product in products %}
    <div class="col-md-4">
        <div class="card shadow mb-4">
          <img
          src="{{product.image}}"
          height="230"
          class="card-img-top"
          >
          <div class="card-body">
            <h4>{{product.name}}</h4>
            <h5>₹ {{product.price}}</h5>
            <button class="btn btn-danger">
                Add to cart
            </button>
          </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
